<!DOCTYPE html>
<html>
<head>
  <title>Exercise 2 - Login Form</title>
  <style>
    body { font-family: Arial; padding: 30px; background: #f0f4f8; }
    .form-box { background: white; padding: 30px; border-radius: 8px; width: 300px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 8px; margin: 8px 0 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    #result { margin-top: 20px; font-size: 18px; font-weight: bold; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Login</h2>
    <label>Username:</label>
    <input type="text" id="username" placeholder="Enter username" />
    <label>Password:</label>
    <input type="password" id="password" placeholder="Enter password" />
    <button id="login-btn" onclick="doLogin()">Login</button>
  </div>
  <div id="result"></div>

  <script>
    function doLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const result = document.getElementById('result');
      if (u === 'admin' && p === 'secret123') {
        result.className = 'success';
        result.textContent = 'Login successful! Welcome, admin.';
      } else {
        result.className = 'error';
        result.textContent = 'Invalid credentials. Please try again.';
      }
    }
  </script>
</body>
</html>
