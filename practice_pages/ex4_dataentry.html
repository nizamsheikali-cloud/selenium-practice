<!DOCTYPE html>
<html>
<head>
  <title>Exercise 4 - Data Entry Form</title>
  <style>
    body { font-family: Arial; padding: 30px; background: #fafafa; }
    .form-container { background: white; padding: 30px; max-width: 400px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    label { font-weight: bold; display: block; margin-top: 12px; }
    input, select, textarea { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 20px; padding: 10px 20px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    #output { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Registration Form</h2>

    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname" placeholder="John Doe" />

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="john@example.com" />

    <label for="country">Country:</label>
    <select id="country" name="country">
      <option value="">-- Select --</option>
      <option value="India">India</option>
      <option value="USA">USA</option>
      <option value="UK">UK</option>
      <option value="Canada">Canada</option>
    </select>

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="3" placeholder="Enter your message"></textarea>

    <button id="submit-btn" onclick="submitForm()">Submit</button>
  </div>

  <div id="output">
    <strong>Form Submitted!</strong>
    <p id="output-name"></p>
    <p id="output-email"></p>
    <p id="output-country"></p>
    <p id="output-message"></p>
  </div>

  <script>
    function submitForm() {
      document.getElementById('output-name').textContent = 'Name: ' + document.getElementById('fullname').value;
      document.getElementById('output-email').textContent = 'Email: ' + document.getElementById('email').value;
      document.getElementById('output-country').textContent = 'Country: ' + document.getElementById('country').value;
      document.getElementById('output-message').textContent = 'Message: ' + document.getElementById('message').value;
      document.getElementById('output').style.display = 'block';
    }
  </script>
</body>
</html>
